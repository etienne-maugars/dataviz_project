name: Streamlit Keep Alive

on:
  schedule:
    # Toutes les heures à la minute 0
    - cron: '0 * * * *'
  workflow_dispatch: # Pour pouvoir le lancer à la main et tester

jobs:
  ping_app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit URL
        run: |
          curl -I https://sleepquality-gpa.streamlit.app/